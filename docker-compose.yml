services:
  postgres:
    image: postgres:16
    container_name: nba-gm-postgres
    environment:
      POSTGRES_USER: nbagm
      POSTGRES_PASSWORD: nbagm_dev
      POSTGRES_DB: nba_gm_simulator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
